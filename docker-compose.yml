version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bi_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-biuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bipassword}
      POSTGRES_DB: ${DB_NAME:-business_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-biuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bi_redis
    ports:
      - "6379:6379"
    networks:
      - bi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bi_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-biuser}:${DB_PASSWORD:-bipassword}@postgres:5432/${DB_NAME:-business_intelligence}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
      DEBUG: ${DEBUG:-True}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bi_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bi_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bi_network
    environment:
      REACT_APP_API_URL: http://backend:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bi_network:
    driver: bridge
